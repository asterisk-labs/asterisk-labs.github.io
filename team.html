---
layout: default
title: Team of Asterisk Labs
---

    <main class="mb-auto" style="text-align: justify;">
    <div class="team-section">
      <h3 style="margin-top: 100px;">team</h3>
      <div class="row justify-content-center">
        
        {% for member in site.data.members %}
        
          <div class="col-md-4 mb-4 partner-name">
          <div class="team-member">
            <div class="hexagon" style='background-color: {{ member.color }}'>
              <img src="{{ member.image | relative_url }}" alt="{{ member.name }}" class="profile-img">
            </div>
            <h4>{{ member.name }}</h4>
            <p class="description">{{ member.bio }}</p>
          </div>
        </div>
        
        {% endfor %}
      </div>
    </div>
  </main>
      
    
<script type="text/javascript">
document.querySelectorAll(".partner-name").forEach(e=>e.style.order=parseInt(Math.random()*1e9));
</script>
